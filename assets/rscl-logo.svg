<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" role="img" aria-label="RSCL at CPP — Reconfigurable Space Computing Lab, Cal Poly Pomona">
  <title>RSCL@CPP — Reconfigurable Space Computing Lab</title>
  <desc>Wordmark for the Reconfigurable Space Computing Lab. A stylized microcavity glyph contains a slowly rotating miniature galaxy, representing the lab's work at the intersection of space and reconfigurable computing.</desc>

  <defs>
    <radialGradient id="ll-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7c2" stop-opacity="1"/>
      <stop offset="35%" stop-color="#fcde5a" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ef9f27" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ef9f27" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ll-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9fe1cb" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#9fe1cb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#9fe1cb" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ll-cavity-clip">
      <rect x="-2" y="-2" width="60" height="32" rx="2"/>
    </clipPath>
  </defs>

  <g transform="translate(8, 20)">
    <line x1="0" y1="0" x2="56" y2="0" stroke="#9fe1cb" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="28" x2="56" y2="28" stroke="#9fe1cb" stroke-width="2" stroke-linecap="round"/>

    <g clip-path="url(#ll-cavity-clip)">
      <ellipse cx="28" cy="14" rx="26" ry="10" fill="url(#ll-halo)"/>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 28 14" to="360 28 14" dur="42s" repeatCount="indefinite"/>

        <path d="M 28 14 Q 18 8 8 12 Q 14 14 20 14" fill="none" stroke="#9fe1cb" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
        <path d="M 28 14 Q 38 20 48 16 Q 42 14 36 14" fill="none" stroke="#9fe1cb" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
        <path d="M 28 14 Q 22 18 14 18 Q 20 16 24 15" fill="none" stroke="#fcde5a" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>
        <path d="M 28 14 Q 34 10 42 10 Q 36 12 32 13" fill="none" stroke="#fcde5a" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>

        <circle cx="12" cy="13" r="0.5" fill="#fff" opacity="0.9"/>
        <circle cx="18" cy="11" r="0.4" fill="#fff" opacity="0.75"/>
        <circle cx="22" cy="16" r="0.5" fill="#fff" opacity="0.85"/>
        <circle cx="36" cy="11" r="0.4" fill="#fff" opacity="0.75"/>
        <circle cx="40" cy="17" r="0.5" fill="#fff" opacity="0.9"/>
        <circle cx="46" cy="13" r="0.4" fill="#fff" opacity="0.75"/>
        <circle cx="32" cy="16" r="0.4" fill="#9fe1cb" opacity="0.85"/>
        <circle cx="24" cy="12" r="0.4" fill="#9fe1cb" opacity="0.85"/>
        <circle cx="44" cy="11" r="0.35" fill="#fcde5a" opacity="0.95"/>
        <circle cx="14" cy="16" r="0.35" fill="#fcde5a" opacity="0.95"/>
      </g>

      <circle cx="28" cy="14" r="5" fill="url(#ll-core)">
        <animate attributeName="r" values="4.5;5.5;4.5" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="28" cy="14" r="1.4" fill="#fff7c2">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <line x1="-4" y1="14" x2="2" y2="14" stroke="#9fe1cb" stroke-width="0.6" opacity="0.45" stroke-linecap="round"/>
    <line x1="54" y1="14" x2="60" y2="14" stroke="#9fe1cb" stroke-width="0.6" opacity="0.45" stroke-linecap="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="500">
    <text x="80" y="42" font-size="28" fill="#ece9dd" letter-spacing="0.5">RSCL</text>
    <text x="146" y="42" font-size="28" fill="#fcde5a" letter-spacing="0.5">@</text>
    <text x="167" y="42" font-size="28" fill="#ece9dd" letter-spacing="0.5">CPP</text>
  </g>

  <text x="80" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="500" fill="#9fe1cb" opacity="0.85" letter-spacing="2.4">RECONFIGURABLE SPACE COMPUTING LAB</text>
</svg>
