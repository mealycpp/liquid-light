<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="RSCL at CPP — Reconfigurable Space Computing Lab, Cal Poly Pomona">
  <title>RSCL@CPP square mark</title>
  <desc>Square emblem with a rotating miniature galaxy held between two Bragg mirrors. Set above the lab acronym for the Reconfigurable Space Computing Lab at California State Polytechnic University, Pomona.</desc>

  <defs>
    <radialGradient id="sq-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7c2" stop-opacity="1"/>
      <stop offset="35%" stop-color="#fcde5a" stop-opacity="0.92"/>
      <stop offset="72%" stop-color="#ef9f27" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ef9f27" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sq-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9fe1cb" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#9fe1cb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#9fe1cb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sq-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#13132a"/>
      <stop offset="100%" stop-color="#08081a"/>
    </radialGradient>
    <clipPath id="sq-cavity-clip">
      <rect x="-3" y="-3" width="126" height="56" rx="3"/>
    </clipPath>
  </defs>

  <circle cx="110" cy="110" r="106" fill="url(#sq-bg)" stroke="#9fe1cb" stroke-width="1" stroke-opacity="0.35"/>

  <!-- background star field, tiny -->
  <g opacity="0.6">
    <circle cx="40" cy="32" r="0.5" fill="#fff"/>
    <circle cx="180" cy="40" r="0.6" fill="#fff"/>
    <circle cx="28" cy="180" r="0.5" fill="#fff"/>
    <circle cx="190" cy="170" r="0.6" fill="#fff"/>
    <circle cx="55" cy="200" r="0.4" fill="#fff"/>
    <circle cx="170" cy="200" r="0.4" fill="#fff"/>
    <circle cx="200" cy="100" r="0.4" fill="#fff"/>
    <circle cx="20" cy="100" r="0.4" fill="#fff"/>
  </g>

  <g transform="translate(50, 70)">
    <!-- mirrors -->
    <line x1="0" y1="0" x2="120" y2="0" stroke="#9fe1cb" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="0" y1="50" x2="120" y2="50" stroke="#9fe1cb" stroke-width="2.4" stroke-linecap="round"/>

    <g clip-path="url(#sq-cavity-clip)">
      <ellipse cx="60" cy="25" rx="58" ry="22" fill="url(#sq-halo)"/>

      <!-- rotating galaxy -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 60 25" to="360 60 25" dur="48s" repeatCount="indefinite"/>

        <!-- spiral arms -->
        <path d="M 60 25 Q 42 13 18 22 Q 32 24 44 25" fill="none" stroke="#9fe1cb" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <path d="M 60 25 Q 78 37 102 28 Q 88 26 76 25" fill="none" stroke="#9fe1cb" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <path d="M 60 25 Q 48 32 28 36 Q 42 30 52 27" fill="none" stroke="#fcde5a" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
        <path d="M 60 25 Q 72 18 92 14 Q 78 20 68 23" fill="none" stroke="#fcde5a" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>

        <!-- third, dimmer pair of arms for depth -->
        <path d="M 60 25 Q 50 20 38 16" fill="none" stroke="#fff" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>
        <path d="M 60 25 Q 70 30 82 34" fill="none" stroke="#fff" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>

        <!-- stars -->
        <circle cx="22" cy="22" r="0.7" fill="#fff" opacity="0.9"/>
        <circle cx="32" cy="18" r="0.6" fill="#fff" opacity="0.75"/>
        <circle cx="38" cy="28" r="0.7" fill="#fff" opacity="0.85"/>
        <circle cx="44" cy="20" r="0.5" fill="#9fe1cb" opacity="0.9"/>
        <circle cx="78" cy="22" r="0.5" fill="#9fe1cb" opacity="0.9"/>
        <circle cx="78" cy="30" r="0.6" fill="#fff" opacity="0.85"/>
        <circle cx="86" cy="18" r="0.5" fill="#fff" opacity="0.75"/>
        <circle cx="94" cy="25" r="0.6" fill="#fff" opacity="0.85"/>
        <circle cx="100" cy="32" r="0.6" fill="#fff" opacity="0.85"/>
        <circle cx="48" cy="32" r="0.5" fill="#fcde5a" opacity="0.95"/>
        <circle cx="72" cy="32" r="0.5" fill="#fcde5a" opacity="0.95"/>
        <circle cx="26" cy="30" r="0.4" fill="#fcde5a" opacity="0.95"/>
        <circle cx="94" cy="18" r="0.4" fill="#fcde5a" opacity="0.95"/>
        <circle cx="50" cy="14" r="0.5" fill="#fff" opacity="0.85"/>
        <circle cx="70" cy="14" r="0.4" fill="#fff" opacity="0.85"/>
        <circle cx="50" cy="38" r="0.5" fill="#fff" opacity="0.85"/>
        <circle cx="70" cy="38" r="0.4" fill="#fff" opacity="0.85"/>
      </g>

      <!-- pulsing core, doesn't rotate -->
      <circle cx="60" cy="25" r="10" fill="url(#sq-core)">
        <animate attributeName="r" values="9;11;9" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="25" r="2.4" fill="#fff7c2">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- escape flow -->
    <line x1="-6" y1="25" x2="4" y2="25" stroke="#9fe1cb" stroke-width="0.9" opacity="0.5" stroke-linecap="round"/>
    <line x1="116" y1="25" x2="126" y2="25" stroke="#9fe1cb" stroke-width="0.9" opacity="0.5" stroke-linecap="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="500" text-anchor="middle">
    <text x="110" y="162" font-size="30" fill="#ece9dd" letter-spacing="2">RSCL<tspan fill="#fcde5a">@</tspan>CPP</text>
    <text x="110" y="182" font-size="9" fill="#9fe1cb" opacity="0.8" letter-spacing="2.8">RECONFIGURABLE SPACE</text>
    <text x="110" y="196" font-size="9" fill="#9fe1cb" opacity="0.8" letter-spacing="2.8">COMPUTING LAB</text>
  </g>
</svg>
